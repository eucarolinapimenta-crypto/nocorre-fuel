name: Atualizar preços de combustível

on:
  schedule:
    # Todo domingo às 06:00 UTC (03:00 horário de Brasília)
    # ANP publica os dados toda semana
    - cron: '0 6 * * 0'
  workflow_dispatch:
    # Permite rodar manualmente pelo GitHub Actions

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar script de coleta ANP
        run: python fetch_prices.py

      - name: Verificar se prices.json foi gerado
        run: |
          if [ ! -f prices.json ]; then
            echo "ERRO: prices.json não foi gerado"
            exit 1
          fi
          echo "prices.json gerado com sucesso:"
          cat prices.json | python -m json.tool | head -20

      - name: Commit e push do prices.json atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          # Só faz commit se houver mudança
          git diff --staged --quiet || git commit -m "chore: atualiza preços ANP $(date +'%Y-%m-%d')"
          git push
